<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GamerSafe 👑 MASTER PANEL KONTROL CLOUD</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>body { font-family: 'Plus Jakarta Sans', sans-serif; }</style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col justify-between antialiased bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-slate-900 via-slate-950 to-slate-950">

    <div id="login-screen" class="fixed inset-0 bg-slate-950 z-50 flex items-center justify-center p-4">
        <div class="bg-slate-900/80 border border-slate-800/80 p-8 rounded-3xl max-w-sm w-full text-center shadow-2xl backdrop-blur-xl space-y-6">
            <div class="w-16 h-16 bg-rose-500/10 border border-rose-500/30 rounded-2xl flex items-center justify-center mx-auto text-rose-500 text-2xl shadow-lg shadow-rose-500/10">
                <i class="fa-solid fa-crown"></i>
            </div>
            <div>
                <h3 class="text-lg font-bold text-slate-100">GamerSafe Master Panel</h3>
                <p class="text-[11px] text-slate-400 mt-1">Sistem Otentikasi Terenkripsi Administrator</p>
            </div>
            <div class="space-y-3">
                <input type="password" id="admin-password-input" placeholder="••••••••" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-sm text-center tracking-widest focus:outline-none focus:border-rose-500 transition-all text-white font-mono">
                <button onclick="verifikasiLoginAdminMaster()" class="w-full bg-rose-600 hover:bg-rose-500 text-white text-xs font-bold py-3 rounded-xl transition-all shadow-lg shadow-rose-600/20 cursor-pointer">
                    Masuk Server Utama
                </button>
            </div>
        </div>
    </div>

    <div class="max-w-6xl mx-auto w-full p-3 sm:p-5 space-y-4 flex-grow hidden" id="admin-main-interface">
        
        <header class="bg-slate-900 border border-slate-800 p-4 rounded-2xl flex flex-col sm:flex-row justify-between items-center gap-4 shadow-xl">
            <div class="flex items-center gap-3">
                <div class="bg-rose-950/60 border border-rose-900 p-2.5 rounded-xl text-rose-400 text-xl"><i class="fa-solid fa-shield-halved"></i></div>
                <div>
                    <h1 class="text-xs font-bold uppercase tracking-wider text-slate-200">GamerSafe Server Framework v1.3.0</h1>
                    <p class="text-[10px] text-slate-500 font-mono">Jaringan: <span class="text-emerald-400 font-bold">ONLINE & AUTO-DETECT</span></p>
                </div>
            </div>
            
            <div class="flex flex-wrap gap-2 w-full sm:w-auto justify-end items-center">
                <div class="bg-slate-950 border border-slate-800 rounded-xl p-2 px-3 flex flex-col text-right font-mono">
                    <span class="text-[8px] text-slate-500 tracking-wider font-bold">REKENING UTAMA ADMIN:</span>
                    <input type="text" id="cfg-wallet-display" oninput="updateKonfigurasiRekeningAdmin(this.value)" placeholder="DANA: 0812345678" class="bg-transparent border-none text-[10px] text-amber-400 font-bold text-right p-0 focus:outline-none w-48">
                </div>
                <button onclick="buatKamarTransaksiBaru()" class="bg-rose-600 hover:bg-rose-500 text-white text-xs font-bold px-4 py-3 rounded-xl transition-all cursor-pointer shadow-lg shadow-rose-600/10">
                    <i class="fa-solid fa-plus mr-1"></i> Kamar Baru
                </button>
            </div>
        </header>

        <div id="admin-room-grid-stream" class="grid grid-cols-1 md:grid-cols-2 gap-4">
            </div>
    </div>

    <footer class="text-center p-3 border-t border-slate-900/60 text-[9px] text-slate-600 font-mono">
        GamerSafe Escrow System Multiplatform Server Core
    </footer>

    <script>
        const MOCK_API_BASE = "https://6a3293ecc6ca2aee4385407f.mockapi.io/room";

        function verifikasiLoginAdminMaster() {
            const pass = document.getElementById('admin-password-input').value;
            if(pass === "admin123") {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('admin-main-interface').classList.remove('hidden');
                
                // Ambil atau pasang wallet default bawaan
                if(!localStorage.getItem('admin_wallet_config')) {
                    localStorage.setItem('admin_wallet_config', 'BANK BCA: 8371-291-11 a/n GamerSafe');
                }
                document.getElementById('cfg-wallet-display').value = localStorage.getItem('admin_wallet_config');
                
                muatUlangSemuaKamarServer();
                setInterval(muatUlangSemuaKamarServer, 3000);
            } else {
                alert("Kata Sandi Administrator Salah!");
            }
        }

        // Fungsi mengubah nomer e-wallet secara langsung ketika diketik (oninput)
        function updateKonfigurasiRekeningAdmin(nilai) {
            localStorage.setItem('admin_wallet_config', nilai);
        }

        function buatKamarTransaksiBaru() {
            const kodeAcak = "GS-" + Math.floor(1000 + Math.random() * 9000);
            const dataAwal = {
                roomCode: kodeAcak,
                game: "-",
                price: "0",
                buyer_wallet: "-",
                seller_wallet: "-",
                akun_id: "-",
                akun_pass: "-",
                status: "Menunggu Penjual Membuka Harga",
                loc_buyer: "-",
                loc_seller: "-",
                akun_req: `[SYSTEM]: Kamar Transaksi Mandiri ${kodeAcak} Berhasil Didirikan Server.`
            };

            fetch(MOCK_API_BASE, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(dataAwal)
            }).then(() => muatUlangSemuaKamarServer());
        }

        // Fungsi Baru: Menghapus Room secara permanen dari Cloud API
        function hapusKamarTransaksiPermanen(id, roomCode) {
            if(confirm(`Apakah Anda yakin ingin MENGHAPUS KAMAR ${roomCode} secara permanen dari database?`)) {
                fetch(`${MOCK_API_BASE}/${id}`, {
                    method: 'DELETE'
                }).then(() => {
                    alert(`Kamar ${roomCode} berhasil dihapus.`);
                    muatUlangSemharServer();
                });
            }
        }

        function muatUlangSemuaKamarServer() {
            fetch(MOCK_API_BASE)
            .then(res => res.json())
            .then(rooms => {
                const container = document.getElementById('admin-room-grid-stream');
                let html = "";

                rooms.reverse().forEach(room => {
                    html += `
                        <div class="bg-slate-900 border border-slate-800 p-4 rounded-2xl space-y-3 shadow-xl">
                            
                            <div class="flex justify-between items-start border-b border-slate-800 pb-2">
                                <div>
                                    <span class="text-xs font-bold text-slate-200 tracking-wide">${room.roomCode}</span>
                                    <p class="text-[9px] text-slate-500 font-mono">ID Target: ${room.id}</p>
                                </div>
                                <div class="flex items-center gap-2">
                                    <select onchange="ubahStatusKamarManual('${room.id}', this.value)" class="bg-slate-950 border border-slate-800 rounded-lg text-[10px] px-2 py-1 text-amber-400 font-mono focus:outline-none">
                                        <option value="${room.status}" selected>Status: ${room.status}</option>
                                        <option value="Dana Aman di Admin">Dana Aman di Admin</option>
                                        <option value="Selesai & Dicairkan">Selesai & Dicairkan</option>
                                        <option value="TRANSAKSI DIBATALKAN">Batalkan Transaksi</option>
                                        <option value="DITENDANG: Pelanggaran Sistem">Tendang / Blokir Kamar</option>
                                    </select>
                                    <button onclick="hapusKamarTransaksiPermanen('${room.id}', '${room.roomCode}')" class="bg-red-950 hover:bg-red-800 text-red-400 p-1.5 px-2 rounded-lg text-[10px] border border-red-900/50 cursor-pointer transition-all" title="Hapus Permanen">
                                        <i class="fa-solid fa-trash-can"></i>
                                    </button>
                                </div>
                            </div>

                            <div class="grid grid-cols-2 gap-2 text-[10px] font-mono bg-slate-950 p-2.5 rounded-xl border border-slate-800/60">
                                <div><span class="text-slate-500">Item Game:</span> <span class="text-slate-300 font-bold">${room.game}</span></div>
                                <div><span class="text-slate-500">Kesepakatan:</span> <span class="text-emerald-400 font-bold">Rp ${parseInt(room.price).toLocaleString('id-ID')}</span></div>
                                <div class="col-span-2 border-t border-slate-900 pt-1 mt-1">
                                    <span class="text-slate-500">E-Wallet Refund Buyer:</span> <span class="text-slate-300 font-sans">${room.buyer_wallet || '-'}</span>
                                </div>
                                <div class="col-span-2">
                                    <span class="text-slate-500">E-Wallet Pencairan Seller:</span> <span class="text-amber-400 font-sans font-bold">${room.seller_wallet || 'Belum Di-set Penjual'}</span>
                                </div>
                            </div>

                            <div class="bg-slate-950 border border-slate-800 p-2.5 rounded-xl text-[10px] font-mono space-y-1">
                                <span class="text-rose-400 font-bold uppercase text-[8px] block tracking-wide"><i class="fa-solid fa-vault"></i> Secure Cloud Vault Data Akun:</span>
                                <div>ID / EMAIL : <span class="text-slate-200 select-all font-bold">${room.akun_id}</span></div>
                                <div>PASSWORD : <span class="text-slate-200 select-all font-bold">${room.akun_pass}</span></div>
                            </div>

                            <div class="flex gap-1.5">
                                <input type="text" id="chat-admin-${room.id}" placeholder="Ketik pesan resmi administrator..." class="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 text-[11px] text-white focus:outline-none">
                                <button onclick="adminKirimPesanKeKamar('${room.id}')" class="bg-rose-600 hover:bg-rose-500 text-white text-[10px] font-bold px-3.5 rounded-xl cursor-pointer">Kirim</button>
                            </div>
                        </div>
                    `;
                });
                container.innerHTML = html || `<div class="col-span-2 text-center text-slate-600 font-mono text-xs py-10">Belum ada kamar transaksi di server. Klik "+ Kamar Baru" untuk membuat jalur.</div>`;
            });
        }

        function ubahStatusKamarManual(id, statusBaru) {
            let infoTambahan = "";
            if(statusBaru === "Dana Aman di Admin") {
                const walletAdmin = localStorage.getItem('admin_wallet_config') || "Hubungi Admin";
                infoTambahan = `\n[SYSTEM]: Admin mengonfirmasi dana telah masuk ke sistem. Rekening Aktif: ${walletAdmin}.`;
            } else if(statusBaru === "Selesai & Dicairkan") {
                infoTambahan = `\n[SYSTEM]: Admin memverifikasi pelepasan data akun aman. Dana dilepaskan ke penjual. Transaksi Selesai.`;
            } else if(statusBaru === "TRANSAKSI DIBATALKAN") {
                infoTambahan = `\n[SYSTEM]: Admin membatalkan proses rekber. Silakan hubungi pusat bantuan jika ada kendala.`;
            }

            fetch(`${MOCK_API_BASE}/${id}`)
            .then(res => res.json())
            .then(room => {
                return fetch(`${MOCK_API_BASE}/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        status: statusBaru,
                        akun_req: room.akun_req + infoTambahan
                    })
                });
            }).then(() => muatUlangSemuaKamarServer());
        }

        function adminKirimPesanKeKamar(id) {
            const inp = document.getElementById(`chat-admin-${id}`);
            const text = inp.value.trim();
            if(!text) return;

            fetch(`${MOCK_API_BASE}/${id}`)
            .then(res => res.json())
            .then(room => {
                let logChatLama = room.akun_req || "";
                return fetch(`${MOCK_API_BASE}/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ akun_req: logChatLama + "\n" + `[ADMIN] 👑: ${text}` })
                });
            }).then(() => { inp.value = ""; muatUlangSemuaKamarServer(); });
        }
    </script>
</body>
</html>
