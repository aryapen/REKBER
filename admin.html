<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GamerSafe 👑 MASTER PANEL KONTROL CLOUD</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>body { font-family: 'Plus Jakarta Sans', sans-serif; }</style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col justify-between antialiased bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-slate-900 via-slate-950 to-slate-950">

    <div id="login-screen" class="fixed inset-0 bg-slate-950 z-50 flex items-center justify-center p-4">
        <div class="bg-slate-900/80 border border-slate-800/80 p-8 rounded-3xl max-w-sm w-full text-center shadow-2xl backdrop-blur-xl space-y-6">
            <div class="w-16 h-16 bg-rose-500/10 border border-rose-500/30 rounded-2xl flex items-center justify-center mx-auto text-rose-500 text-2xl shadow-lg">
                <i class="fa-solid fa-crown"></i>
            </div>
            <div>
                <h3 class="text-lg font-bold text-slate-100">GamerSafe Master Panel</h3>
                <p class="text-[11px] text-slate-400 mt-1">Sistem Otentikasi Terenkripsi Administrator</p>
            </div>
            <div class="space-y-3">
                <input type="password" id="admin-password-input" placeholder="••••••••" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3 text-sm text-center tracking-widest focus:outline-none focus:border-rose-500 transition-all text-white font-mono">
                <button onclick="verifikasiLoginAdminMaster()" class="w-full bg-rose-600 hover:bg-rose-500 text-white text-xs font-bold py-3 rounded-xl transition-all shadow-lg cursor-pointer">
                    Masuk Server Utama
                </button>
            </div>
        </div>
    </div>

    <div class="max-w-6xl mx-auto w-full p-3 sm:p-5 space-y-4 flex-grow hidden" id="admin-main-interface">
        
        <header class="bg-slate-900 border border-slate-800 p-4 rounded-2xl flex flex-col sm:flex-row justify-between items-center gap-4 shadow-xl">
            <div class="flex items-center gap-3">
                <div class="bg-rose-950/60 border border-rose-900 p-2.5 rounded-xl text-rose-400 text-xl"><i class="fa-solid fa-shield-halved"></i></div>
                <div>
                    <h1 class="text-xs font-bold uppercase tracking-wider text-slate-200">GamerSafe Server Framework v1.5.0</h1>
                    <p class="text-[10px] text-slate-500 font-mono">Jaringan: <span class="text-emerald-400 font-bold">SECURE ANTI-FRAUD ENGINE</span></p>
                </div>
            </div>
            
            <div class="flex flex-wrap gap-2 w-full sm:w-auto justify-end items-center">
                <div class="bg-slate-950 border border-slate-800 rounded-xl p-2 px-3 flex flex-col text-right font-mono">
                    <span class="text-[8px] text-rose-400 tracking-wider font-bold"><i class="fa-solid fa-wallet mr-1"></i>REKENING AKTIF ADMIN (LIVE):</span>
                    <input type="text" id="cfg-wallet-display" oninput="updateKonfigurasiRekeningAdminCloud(this.value)" placeholder="DANA: 0812345678" class="bg-transparent border-none text-[10px] text-amber-400 font-bold text-right p-0 focus:outline-none w-48">
                </div>
                
                <button onclick="eksporSeluruhLogKeTextFile()" class="bg-slate-900 hover:bg-slate-800 border border-slate-800 text-slate-300 text-xs font-bold px-3.5 py-3 rounded-xl transition-all cursor-pointer">
                    <i class="fa-solid fa-download mr-1"></i> Backup Log
                </button>
                <button onclick="buatKamarTransaksiBaru()" class="bg-rose-600 hover:bg-rose-500 text-white text-xs font-bold px-4 py-3 rounded-xl transition-all cursor-pointer shadow-lg shadow-rose-600/10">
                    <i class="fa-solid fa-plus mr-1"></i> Kamar Baru
                </button>
            </div>
        </header>

        <div id="admin-room-grid-stream" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
    </div>

    <footer class="text-center p-3 border-t border-slate-900/60 text-[9px] text-slate-600 font-mono">
        GamerSafe Escrow System Anti-Fraud Cloud Central Framework
    </footer>

    <script>
        const MOCK_API_BASE = "https://6a3293ecc6ca2aee4385407f.mockapi.io/room";

        function verifikasiLoginAdminMaster() {
            const pass = document.getElementById('admin-password-input').value;
            if(pass === "admin123") {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('admin-main-interface').classList.remove('hidden');
                
                // Sinkronisasi konfigurasi e-wallet dari cloud node id 1 pada awal mula sistem
                fetch(`${MOCK_API_BASE}/1`).then(res => res.json()).then(room => {
                    document.getElementById('cfg-wallet-display').value = room.config_wallet || "BANK BCA: 8371-291-11 a/n GamerSafe";
                }).catch(() => {
                    document.getElementById('cfg-wallet-display').value = "BANK BCA: 8371-291-11 a/n GamerSafe";
                });

                muatUlangSemuaKamarServer();
                setInterval(muatUlangSemuaKamarServer, 3000);
            } else {
                alert("🔒 Akses Ditolak: Kata Sandi Master Salah!");
            }
        }

        // Simpan langsung perubahan rekening ke cloud server agar index.html merespon seketika
        function updateKonfigurasiRekeningAdminCloud(nilai) {
            fetch(`${MOCK_API_BASE}/1`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ config_wallet: nilai })
            });
        }

        function buatKamarTransaksiBaru() {
            const kodeAcak = "GS-" + Math.floor(1000 + Math.random() * 9000);
            const dataAwal = {
                roomCode: kodeAcak,
                game: "-",
                price: "0",
                buyer_wallet: "-",
                seller_wallet: "-",
                akun_id: "-",
                akun_pass: "-",
                status: "Menunggu Penjual Membuka Harga",
                loc_buyer: "Block/Mencari...",
                loc_seller: "Block/Mencari...",
                config_wallet: document.getElementById('cfg-wallet-display').value,
                akun_req: `[SYSTEM]: Kamar Rekber ${kodeAcak} Berhasil Didirikan Server Aman.`
            };

            fetch(MOCK_API_BASE, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(dataAwal)
            }).then(() => muatUlangSemuaKamarServer());
        }

        function hapusKamarTransaksiPermanen(id, roomCode) {
            if(confirm(`⚠️ Peringatan: Hapus kamar ${roomCode} permanen dari database cloud?`)) {
                fetch(`${MOCK_API_BASE}/${id}`, { method: 'DELETE' }).then(() => {
                    muatUlangSemuaKamarServer();
                });
            }
        }

        function muatUlangSemuaKamarServer() {
            fetch(MOCK_API_BASE)
            .then(res => res.json())
            .then(rooms => {
                const container = document.getElementById('admin-room-grid-stream');
                let html = "";

                rooms.reverse().forEach(room => {
                    if(!room.roomCode) return; // Mencegah crash jika data id config terbaca kosong

                    // Validasi Deteksi GPS untuk mencegah manipulasi
                    let gpsBuyerBadge = room.loc_buyer.includes("Block") || room.loc_buyer.includes("Mencari") 
                        ? `<span class="text-rose-500 font-bold bg-rose-950/40 px-1.5 py-0.5 rounded border border-rose-900"><i class="fa-solid fa-triangle-exclamation"></i> OFF</span>` 
                        : `<span class="text-emerald-400 font-bold bg-emerald-950/40 px-1.5 py-0.5 rounded border border-emerald-900">${room.loc_buyer}</span>`;
                    
                    let gpsSellerBadge = room.loc_seller.includes("Block") || room.loc_seller.includes("Mencari") 
                        ? `<span class="text-rose-500 font-bold bg-rose-950/40 px-1.5 py-0.5 rounded border border-rose-900"><i class="fa-solid fa-triangle-exclamation"></i> OFF</span>` 
                        : `<span class="text-emerald-400 font-bold bg-emerald-950/40 px-1.5 py-0.5 rounded border border-emerald-900">${room.loc_seller}</span>`;

                    html += `
                        <div class="bg-slate-900 border border-slate-800 p-4 rounded-2xl space-y-3 shadow-xl">
                            <div class="flex justify-between items-start border-b border-slate-800 pb-2">
                                <div>
                                    <span class="text-xs font-bold text-slate-200 tracking-wide">${room.roomCode}</span>
                                    <p class="text-[9px] text-slate-500 font-mono">DB-Ref Node: #${room.id}</p>
                                </div>
                                <div class="flex items-center gap-2">
                                    <select onchange="ubahStatusKamarManual('${room.id}', this.value)" class="bg-slate-950 border border-slate-800 rounded-lg text-[10px] px-2 py-1 text-amber-400 font-mono focus:outline-none cursor-pointer">
                                        <option value="${room.status}" selected>Status: ${room.status}</option>
                                        <option value="Dana Aman di Admin">Dana Aman di Admin</option>
                                        <option value="Selesai & Dicairkan">Selesai & Dicairkan</option>
                                        <option value="TRANSAKSI DIBATALKAN/REFUND">Batalkan Transaksi</option>
                                        <option value="DITENDANG: Akses GPS Dimatikan / Terindikasi Fraud">Tendang/Blokir Kamar</option>
                                    </select>
                                    <button onclick="hapusKamarTransaksiPermanen('${room.id}', '${room.roomCode}')" class="bg-slate-950 hover:bg-red-950/50 text-slate-500 hover:text-red-400 p-1.5 px-2 rounded-lg text-[10px] border border-slate-800 hover:border-red-900/50 transition-all cursor-pointer">
                                        <i class="fa-solid fa-trash-can"></i>
                                    </button>
                                </div>
                            </div>

                            <div class="grid grid-cols-2 gap-2 bg-slate-950 p-2.5 rounded-xl border border-slate-800/80 text-[9px] font-mono">
                                <div><i class="fa-solid fa-location-crosshairs text-indigo-400 mr-1"></i>GPS Buyer:<br class="mb-1">${gpsBuyerBadge}</div>
                                <div><i class="fa-solid fa-location-crosshairs text-amber-500 mr-1"></i>GPS Seller:<br class="mb-1">${gpsSellerBadge}</div>
                            </div>

                            <div class="grid grid-cols-2 gap-2 text-[10px] font-mono bg-slate-950 p-2.5 rounded-xl border border-slate-800/60">
                                <div><span class="text-slate-500">Nama Game:</span><br><span class="text-slate-200 font-bold">${room.game}</span></div>
                                <div><span class="text-slate-500">Kesepakatan:</span><br><span class="text-emerald-400 font-bold">Rp ${parseInt(room.price || 0).toLocaleString('id-ID')}</span></div>
                            </div>

                            <div class="grid grid-cols-2 gap-2 text-[9px] font-mono bg-slate-950/60 p-2 rounded-xl border border-slate-900">
                                <div><span class="text-slate-500">Refund Buyer:</span><br><span class="text-slate-300 font-medium">${room.buyer_wallet || '-'}</span></div>
                                <div><span class="text-slate-500">Pencairan Seller:</span><br><span class="text-slate-300 font-medium">${room.seller_wallet || '-'}</span></div>
                            </div>

                            <div class="bg-slate-950 border border-slate-800 p-2.5 rounded-xl text-[10px] font-mono space-y-1">
                                <span class="text-rose-400 font-bold uppercase text-[8px] block"><i class="fa-solid fa-vault mr-1"></i>Secure Cloud Vault Data Akun:</span>
                                <div>ID/EMAIL: <span class="text-slate-200 select-all font-bold">${room.akun_id}</span></div>
                                <div>PASSWORD: <span class="text-slate-200 select-all font-bold">${room.akun_pass}</span></div>
                            </div>

                            <div class="flex gap-1.5">
                                <input type="text" id="chat-admin-${room.id}" placeholder="Ketik pengumuman resmi administrator..." class="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 text-[11px] text-white focus:outline-none focus:border-rose-500">
                                <button onclick="adminKirimPesanKeKamar('${room.id}')" class="bg-rose-600 hover:bg-rose-500 text-white text-[10px] font-bold px-3.5 rounded-xl transition-all cursor-pointer">Kirim</button>
                            </div>
                        </div>
                    `;
                });
                container.innerHTML = html || `<div class="col-span-2 text-center text-slate-600 font-mono text-xs py-10">Belum ada kamar aktif terdaftar di server cloud.</div>`;
            });
        }

        function ubahStatusKamarManual(id, statusBaru) {
            fetch(`${MOCK_API_BASE}/${id}`).then(res => res.json()).then(room => {
                let info = `\n[SYSTEM]: Status keamanan kamar dialihkan oleh Admin ke [${statusBaru}].`;
                fetch(`${MOCK_API_BASE}/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status: statusBaru, akun_req: room.akun_req + info })
                }).then(() => muatUlangSemuaKamarServer());
            });
        }

        function adminKirimPesanKeKamar(id) {
            const inp = document.getElementById(`chat-admin-${id}`);
            const pesanTxt = inp.value.trim();
            if(!pesanTxt) return;

            fetch(`${MOCK_API_BASE}/${id}`).then(res => res.json()).then(room => {
                fetch(`${MOCK_API_BASE}/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ akun_req: room.akun_req + "\n" + `[ADMIN] 👑: ${pesanTxt}` })
                }).then(() => { inp.value = ""; muatUlangSemuaKamarServer(); });
            });
        }

        function eksporSeluruhLogKeTextFile() {
            fetch(MOCK_API_BASE).then(res => res.json()).then(data => {
                if(!data || data.length === 0) return alert("Server database kosong.");

                let teksLog = "=== GAMERSAFE ESCROW ANTI-FRAUD SERVER BACKUP LOG ===\r\n\r\n";
                data.forEach(room => {
                    if(!room.roomCode) return;
                    teksLog += `KODE ROOM      : ${room.roomCode}\r\n`;
                    teksLog += `STATUS TRANSAKSI: ${room.status}\r\n`;
                    teksLog += `NAMA DATA ITEM  : ${room.game || '-'}\r\n`;
                    teksLog += `NOMINAL DEAL    : Rp ${parseInt(room.price || 0).toLocaleString('id-ID')}\r\n`;
                    teksLog += `KOORDINAT BUYER : ${room.loc_buyer || '-'}\r\n`;
                    teksLog += `KOORDINAT SELLER: ${room.loc_seller || '-'}\r\n`;
                    teksLog += `REFUND BUYER    : ${room.buyer_wallet || '-'}\r\n`;
                    teksLog += `CAIRAN SELLER   : ${room.seller_wallet || '-'}\r\n`;
                    teksLog += `DATA VAULT CLOUD: ID:[ ${room.akun_id || '-'} ] PASS:[ ${room.akun_pass || '-'} ]\r\n`;
                    teksLog += `---------------------------------------------------------\r\n`;
                    teksLog += `RIWAYAT LIVE STREAM CHAT LOG :\r\n${room.akun_req || '-'}\r\n`;
                    teksLog += "=========================================================\r\n\r\n";
                });

                const blob = new Blob([teksLog], { type: "text/plain;charset=utf-8" });
                const link = document.createElement("a");
                link.href = URL.createObjectURL(blob);
                link.download = `GamerSafe_Server_Backup_Log_${Date.now()}.txt`;
                link.click();
            });
        }
    </script>
</body>
</html>
